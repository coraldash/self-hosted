services:
  db:
    image: supabase/postgres:17.6.1.103
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/init-roles.sql:/docker-entrypoint-initdb.d/zz-init-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      # First boot runs the full Supabase init script set; slow disks need the grace.
      start_period: 180s

  auth:
    image: supabase/gotrue:v2.170.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${SITE_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      # Match the app's client-side minimum (the UI enforces 8 characters).
      GOTRUE_PASSWORD_MIN_LENGTH: "8"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${SITE_URL}/auth/v1/callback
      # --- Email/password auth ---
      # Email/password signup works out of the box: GOTRUE_MAILER_AUTOCONFIRM
      # (above) is "true", so accounts are activated immediately with no email.
      #
      # OPTIONAL: to require email confirmation and enable "forgot password"
      # reset emails, set the SMTP_* vars in .env, uncomment the lines below, and
      # flip GOTRUE_MAILER_AUTOCONFIRM to "false". Works with any SMTP provider.
      # GOTRUE_MAILER_AUTOCONFIRM: "false"
      # GOTRUE_SMTP_HOST: ${SMTP_HOST}
      # GOTRUE_SMTP_PORT: ${SMTP_PORT}
      # GOTRUE_SMTP_USER: ${SMTP_USER}
      # GOTRUE_SMTP_PASS: ${SMTP_PASS}
      # GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_SENDER_EMAIL}
      # GOTRUE_SMTP_SENDER_NAME: Coral Dash
      # GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/confirm
      # GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/confirm
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      # GoTrue runs its own migrations on first boot against a cold database.
      start_period: 60s

  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    # No healthcheck: the amd64 PostgREST image is distroless (no shell or probe
    # binary), so an in-container probe cannot run. Matches upstream Supabase.
    # PostgREST retries its DB connection internally; Kong serves 503 on
    # /rest/v1/* until it is ready.

  kong:
    image: kong:3.8
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      auth:
        condition: service_healthy
      rest:
        # service_started, not service_healthy: the rest image cannot host a
        # healthcheck (see above), so there is no health state to wait on.
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./docker/kong.yml:/etc/kong/kong.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'head -c 0 < /dev/tcp/localhost/8000' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  studio:
    image: supabase/studio:20241202-4c75d03
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3100:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: "Coral Dash"
      DEFAULT_PROJECT_NAME: "Self-Hosted"
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SITE_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    profiles:
      - debug

  meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    profiles:
      - debug

  coraldash:
    image: ghcr.io/coraldash/coraldash:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      SELF_HOSTED: "true"
      LICENSE_KEY: ${LICENSE_KEY}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      # Browser-facing Supabase URL (must be reachable from user's browser via reverse proxy)
      NEXT_PUBLIC_SUPABASE_URL: ${SITE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      # Internal Docker-network Supabase URL (used by server-side code for faster routing)
      SUPABASE_URL: http://kong:8000
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      NEXT_PUBLIC_SELF_HOSTED: "true"
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      ALLOWED_EMAIL: ${ALLOWED_EMAIL:-}
      CRON_SECRET: ${CRON_SECRET}
      SYNC_SCHEDULE: ${SYNC_SCHEDULE:-0 6 * * *}
      TRADING212_ENCRYPTION_KEY: ${TRADING212_ENCRYPTION_KEY:-}
      METALPRICE_API_KEY: ${METALPRICE_API_KEY:-}

volumes:
  db-data:
